name: Security Scan

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_scans:
    runs-on: ubicloud-standard-2
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --prod

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Run Trivy vulnerability, secret, and misconfiguration scan
        run: |
          trivy fs \
            --scanners vuln,secret,misconfig \
            --format json \
            --severity HIGH,CRITICAL \
            --skip-dirs node_modules \
            --skip-dirs .next \
            --skip-dirs out \
            --skip-dirs coverage \
            --exit-code 1 \
            --output trivy-security-report.json \
            .

      - name: Upload security scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-security-report-${{ github.run_id }}
          path: trivy-security-report.json
          if-no-files-found: ignore
