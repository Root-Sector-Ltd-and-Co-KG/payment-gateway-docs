name: Deploy Docs (Azure Container Apps)

on:
  push:
    branches:
      - main
    paths:
      - "**"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: payment-gateway-docs-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: payment-gateway-docs
  CONTAINER_PORT: "3000"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_LC="$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER_LC}/${IMAGE_LC}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail

            RG="${{ vars.AZURE_RESOURCE_GROUP }}"
            APP="${{ vars.AZURE_CONTAINERAPP_NAME }}"
            ENV_NAME="${{ vars.AZURE_CONTAINERAPPS_ENVIRONMENT }}"
            LOCATION="${{ vars.AZURE_LOCATION }}"

            IMAGE="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}"

            # Create the app if it doesn't exist yet; otherwise update.
            if az containerapp show -g "$RG" -n "$APP" > /dev/null 2>&1; then
              az containerapp update \
                -g "$RG" \
                -n "$APP" \
                --image "$IMAGE" \
                --set-env-vars PORT=${{ env.CONTAINER_PORT }} HOSTNAME=0.0.0.0 \
                --revision-suffix "${GITHUB_SHA::7}"
            else
              az containerapp create \
                -g "$RG" \
                -n "$APP" \
                --environment "$ENV_NAME" \
                --location "$LOCATION" \
                --image "$IMAGE" \
                --ingress external \
                --target-port ${{ env.CONTAINER_PORT }} \
                --min-replicas 1 \
                --max-replicas 3 \
                --cpu 0.5 \
                --memory 1Gi \
                --env-vars PORT=${{ env.CONTAINER_PORT }} HOSTNAME=0.0.0.0 \
                --revision-suffix "${GITHUB_SHA::7}"

            az containerapp show -g "$RG" -n "$APP" --query "properties.configuration.ingress.fqdn" -o tsv
