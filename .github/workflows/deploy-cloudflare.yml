name: Deploy Cloudflare Docs

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "content/**"
      - "lib/**"
      - "scripts/**"
      - "mdx-components.tsx"
      - "next.config.mjs"
      - "open-next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "postcss.config.mjs"
      - "source.config.ts"
      - "tsconfig.json"
      - "wrangler.toml"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy-production:
    name: Deploy -> Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://docs.payment-gateway.app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm deploy:cf:production
